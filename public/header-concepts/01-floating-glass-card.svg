<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 520" width="1440" height="520">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070A"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow1" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(126,231,135,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Glass card gradient -->
    <linearGradient id="glass1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.07)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <!-- Glass border gradient -->
    <linearGradient id="glassBorder1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.10)"/>
    </linearGradient>
    <!-- Blur filter for glass effect -->
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="520" fill="url(#bg1)"/>
  <rect width="1440" height="520" fill="url(#glow1)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="130" x2="1440" y2="130"/>
    <line x1="0" y1="260" x2="1440" y2="260"/>
    <line x1="0" y1="390" x2="1440" y2="390"/>
    <line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="720" y1="0" x2="720" y2="520"/>
    <line x1="1080" y1="0" x2="1080" y2="520"/>
  </g>

  <!-- Floating ambient orb behind card -->
  <ellipse cx="950" cy="200" rx="250" ry="200" fill="rgba(126,231,135,0.04)" filter="url(#blur1)"/>

  <!-- ═══ FLOATING GLASS CARD ═══ -->
  <g transform="translate(120, 80)">
    <!-- Card shadow -->
    <rect x="8" y="8" width="1200" height="360" rx="24" fill="rgba(0,0,0,0.3)" filter="url(#blur1)"/>

    <!-- Glass card body -->
    <rect width="1200" height="360" rx="24" fill="url(#glass1)"/>
    <rect width="1200" height="360" rx="24" fill="none" stroke="url(#glassBorder1)" stroke-width="1"/>

    <!-- Inner content layout: Left brand + Right price -->
    <g transform="translate(64, 56)">
      <!-- LEFT SIDE: Brand block -->
      <!-- Ticker badge -->
      <rect width="220" height="32" rx="8" fill="rgba(126,231,135,0.1)" stroke="rgba(126,231,135,0.2)" stroke-width="0.5"/>
      <text x="16" y="21" font-family="'SF Mono', 'Space Mono', monospace" font-size="12" font-weight="600" fill="#7EE787" letter-spacing="0.1em">NASDAQ: ASTS</text>
      <circle cx="200" cy="16" r="4" fill="#7EE787" opacity="0.6"/>

      <!-- Company name -->
      <text x="0" y="88" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="48" font-weight="700" letter-spacing="-1.5" fill="url(#nameGrad1)">AST SpaceMobile</text>
      <linearGradient id="nameGrad1" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FFFFFF"/>
        <stop offset="100%" stop-color="#8B949E"/>
      </linearGradient>

      <!-- Description -->
      <text x="0" y="124" font-family="-apple-system, sans-serif" font-size="16" fill="#8B949E" letter-spacing="0.01em">
        <tspan>Space-based cellular broadband · Direct-to-Device</tspan>
      </text>

      <!-- Data freshness -->
      <g transform="translate(0, 150)">
        <rect width="180" height="24" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
        <text x="12" y="16" font-family="monospace" font-size="9" fill="#6E7681" letter-spacing="0.05em">DATA AS OF: MAR 01 2026</text>
      </g>

      <!-- Decorative line -->
      <line x1="0" y1="200" x2="400" y2="200" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

      <!-- Mini stats row -->
      <g transform="translate(0, 220)">
        <text font-family="monospace" font-size="9" fill="#6E7681" letter-spacing="0.1em" y="0">MARKET CAP</text>
        <text font-family="'SF Mono', monospace" font-size="18" font-weight="600" fill="#F0F6FC" y="26">$8.2B</text>

        <g transform="translate(160, 0)">
          <text font-family="monospace" font-size="9" fill="#6E7681" letter-spacing="0.1em" y="0">EV / REV</text>
          <text font-family="'SF Mono', monospace" font-size="18" font-weight="600" fill="#F0F6FC" y="26">42.1x</text>
        </g>

        <g transform="translate(320, 0)">
          <text font-family="monospace" font-size="9" fill="#6E7681" letter-spacing="0.1em" y="0">SATELLITES</text>
          <text font-family="'SF Mono', monospace" font-size="18" font-weight="600" fill="#7EE787" y="26">5/168</text>
        </g>
      </g>
    </g>

    <!-- RIGHT SIDE: Price block -->
    <g transform="translate(750, 56)">
      <!-- Price glass panel -->
      <rect width="380" height="248" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

      <g transform="translate(40, 40)">
        <text font-family="monospace" font-size="9" fill="#6E7681" letter-spacing="0.15em">CURRENT PRICE</text>

        <!-- Big price -->
        <text y="64" font-family="'SF Mono', 'Space Mono', monospace" font-size="64" font-weight="700" fill="#F0F6FC" letter-spacing="-3">$26.42</text>

        <!-- Change badge -->
        <g transform="translate(0, 90)">
          <rect width="120" height="30" rx="8" fill="rgba(126,231,135,0.1)"/>
          <text x="14" y="20" font-family="'SF Mono', monospace" font-size="13" font-weight="600" fill="#7EE787">▲ +2.34%</text>
        </g>

        <!-- Refresh + Updated -->
        <g transform="translate(0, 140)">
          <!-- Refresh icon circle -->
          <circle cx="10" cy="10" r="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
          <path d="M7 10a3 3 0 0 1 3-3 3.25 3.25 0 0 1 2.25.92L13.5 6.5" fill="none" stroke="#6E7681" stroke-width="1" stroke-linecap="round"/>
          <path d="M13.5 10a3 3 0 0 1-3 3 3.25 3.25 0 0 1-2.25-.92L6.5 13.5" fill="none" stroke="#6E7681" stroke-width="1" stroke-linecap="round"/>

          <text x="28" y="14" font-family="monospace" font-size="9" fill="#6E7681" letter-spacing="0.03em">Updated: 10:42:18 AM</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Concept label -->
  <text x="720" y="500" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#6E7681" letter-spacing="0.15em">CONCEPT 01 — FLOATING GLASS CARD</text>
</svg>