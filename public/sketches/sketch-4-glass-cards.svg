<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(240,246,252,0.06)"/>
      <stop offset="100%" stop-color="rgba(240,246,252,0.02)"/>
    </linearGradient>
    <linearGradient id="priceCardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(34,211,238,0.08)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.02)"/>
    </linearGradient>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="720" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#6E7681" font-size="13" font-weight="500" letter-spacing="3">SKETCH 4 — GLASS CARD CLUSTER</text>
  <line x1="200" y1="48" x2="1000" y2="48" stroke="#21262D" stroke-width="1"/>
  <text x="600" y="72" text-anchor="middle" fill="#8B949E" font-size="12" font-style="italic">Floating glassmorphism cards. Each piece of info lives in its own card. Modular, airy, premium feel.</text>

  <!-- ═══ HEADER MOCKUP ═══ -->
  <!-- Container -->
  <rect x="40" y="90" width="1120" height="340" rx="16" fill="#080B10" stroke="rgba(240,246,252,0.04)" stroke-width="1"/>

  <!-- Subtle radial glow -->
  <ellipse cx="600" cy="250" rx="500" ry="200" fill="rgba(34,211,238,0.03)"/>

  <!-- ═══ CARD 1: Company Name (large, top-left) ═══ -->
  <rect x="80" y="120" width="380" height="120" rx="16" fill="url(#cardGrad)" stroke="rgba(240,246,252,0.08)" stroke-width="1" filter="url(#shadow4)"/>
  <!-- Inner content -->
  <text x="108" y="165" fill="#F0F6FC" font-size="32" font-weight="700" letter-spacing="-1">ASTS SpaceMobile</text>
  <rect x="108" y="180" width="160" height="24" rx="12" fill="rgba(34,211,238,0.1)"/>
  <text x="118" y="197" fill="#22D3EE" font-size="11" font-family="monospace" font-weight="600">NASDAQ: ASTS</text>
  <text x="280" y="197" fill="#6E7681" font-size="11">D2D Cellular</text>
  <text x="108" y="225" fill="#6E7681" font-size="11">First space-based cellular broadband for smartphones</text>

  <!-- ═══ CARD 2: Price (large, top-right) ═══ -->
  <rect x="490" y="120" width="340" height="120" rx="16" fill="url(#priceCardGrad)" stroke="rgba(34,211,238,0.12)" stroke-width="1" filter="url(#shadow4)"/>
  <!-- Accent dot -->
  <circle cx="510" cy="142" r="4" fill="#22D3EE" opacity="0.6"/>
  <text x="522" y="147" fill="#6E7681" font-size="10" font-weight="500">LIVE PRICE</text>
  <text x="518" y="200" fill="#F0F6FC" font-size="52" font-weight="800" font-family="monospace" letter-spacing="-3">$52.49</text>
  <text x="518" y="225" fill="#7EE787" font-size="13" font-weight="600">▲ +2.34 (4.67%)</text>
  <!-- Refresh button -->
  <circle cx="798" cy="144" r="14" fill="rgba(240,246,252,0.06)" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>
  <text x="798" y="149" text-anchor="middle" fill="#6E7681" font-size="12">↻</text>

  <!-- ═══ CARD 3: Satellites (small, right) ═══ -->
  <rect x="860" y="120" width="260" height="120" rx="16" fill="url(#cardGrad)" stroke="rgba(126,231,135,0.1)" stroke-width="1" filter="url(#shadow4)"/>
  <text x="888" y="150" fill="#6E7681" font-size="10" font-weight="500">CONSTELLATION</text>
  <text x="888" y="192" fill="#F0F6FC" font-size="36" font-weight="700">7<text font-size="20" fill="#6E7681">/60</text></text>
  <text x="888" y="216" fill="#7EE787" font-size="12" font-weight="600">🛰 Satellites Launched</text>
  <!-- Progress bar -->
  <rect x="888" y="226" width="200" height="4" rx="2" fill="rgba(126,231,135,0.15)"/>
  <rect x="888" y="226" width="23" height="4" rx="2" fill="#7EE787"/>

  <!-- ═══ CARD 4: Quick Stats (bottom-left) ═══ -->
  <rect x="80" y="260" width="280" height="80" rx="12" fill="url(#cardGrad)" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <!-- Three mini stats -->
  <text x="108" y="285" fill="#6E7681" font-size="9" font-weight="500">MKT CAP</text>
  <text x="108" y="305" fill="#F0F6FC" font-size="16" font-weight="600">$11.2B</text>
  <line x1="180" y1="275" x2="180" y2="320" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>
  <text x="200" y="285" fill="#6E7681" font-size="9" font-weight="500">EV</text>
  <text x="200" y="305" fill="#F0F6FC" font-size="16" font-weight="600">$12.8B</text>
  <line x1="272" y1="275" x2="272" y2="320" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>
  <text x="292" y="285" fill="#6E7681" font-size="9" font-weight="500">CASH</text>
  <text x="292" y="305" fill="#22D3EE" font-size="16" font-weight="600">$0.7B</text>

  <!-- ═══ CARD 5: Data Freshness (bottom-center) ═══ -->
  <rect x="380" y="260" width="260" height="80" rx="12" fill="url(#cardGrad)" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <text x="408" y="285" fill="#6E7681" font-size="9" font-weight="500">DATA FRESHNESS</text>
  <text x="408" y="308" fill="#F0F6FC" font-size="13" font-weight="500">📅 Feb 28, 2026</text>
  <text x="408" y="328" fill="#22D3EE" font-size="11">Live price · Model data: SEC filings</text>

  <!-- ═══ CARD 6: Partners (bottom-right) ═══ -->
  <rect x="660" y="260" width="220" height="80" rx="12" fill="url(#cardGrad)" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <text x="688" y="285" fill="#6E7681" font-size="9" font-weight="500">GLOBAL REACH</text>
  <text x="688" y="310" fill="#F0F6FC" font-size="18" font-weight="700">53+ Partners</text>
  <text x="688" y="328" fill="#8B949E" font-size="11">2.8B subscribers</text>

  <!-- ═══ ANNOTATION: Design Notes ═══ -->
  <line x1="40" y1="455" x2="1160" y2="455" stroke="#21262D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="485" fill="#22D3EE" font-size="13" font-weight="600">Design Rationale</text>

  <rect x="60" y="500" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="80" y="523" fill="#F0F6FC" font-size="12" font-weight="600">Modular cards</text>
  <text x="80" y="541" fill="#8B949E" font-size="11">Each info type gets its own card.</text>
  <text x="80" y="557" fill="#8B949E" font-size="11">Easy to rearrange per stock.</text>

  <rect x="330" y="500" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="350" y="523" fill="#F0F6FC" font-size="12" font-weight="600">Glassmorphism depth</text>
  <text x="350" y="541" fill="#8B949E" font-size="11">Layered transparency + blur</text>
  <text x="350" y="557" fill="#8B949E" font-size="11">creates premium floating feel.</text>

  <rect x="600" y="500" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="620" y="523" fill="#F0F6FC" font-size="12" font-weight="600">Stats absorbed into header</text>
  <text x="620" y="541" fill="#8B949E" font-size="11">The stats row below is merged</text>
  <text x="620" y="557" fill="#8B949E" font-size="11">into the card grid. Less scrolling.</text>

  <rect x="870" y="500" width="260" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="890" y="523" fill="#F0F6FC" font-size="12" font-weight="600">Visual breathing room</text>
  <text x="890" y="541" fill="#8B949E" font-size="11">Generous gaps between cards.</text>
  <text x="890" y="557" fill="#8B949E" font-size="11">Less dense, more scannable.</text>

  <!-- Layout wireframe -->
  <text x="60" y="620" fill="#22D3EE" font-size="13" font-weight="600">Card Grid</text>

  <rect x="60" y="635" width="200" height="30" rx="4" fill="none" stroke="#8B949E" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="160" y="655" text-anchor="middle" fill="#8B949E" font-size="9">NAME CARD</text>

  <rect x="270" y="635" width="180" height="30" rx="4" fill="none" stroke="#22D3EE" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="360" y="655" text-anchor="middle" fill="#22D3EE" font-size="9">PRICE CARD</text>

  <rect x="460" y="635" width="130" height="30" rx="4" fill="none" stroke="#7EE787" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="525" y="655" text-anchor="middle" fill="#7EE787" font-size="9">SATS CARD</text>

  <rect x="60" y="670" width="130" height="25" rx="4" fill="none" stroke="#6E7681" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="125" y="687" text-anchor="middle" fill="#6E7681" font-size="8">STATS</text>
  <rect x="200" y="670" width="130" height="25" rx="4" fill="none" stroke="#6E7681" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="265" y="687" text-anchor="middle" fill="#6E7681" font-size="8">FRESHNESS</text>
  <rect x="340" y="670" width="130" height="25" rx="4" fill="none" stroke="#6E7681" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="405" y="687" text-anchor="middle" fill="#6E7681" font-size="8">PARTNERS</text>

  <text x="60" y="710" fill="#6E7681" font-size="10">📱 Mobile: Cards stack vertically — Price card first, then name, then smaller cards in 2-column grid.</text>
</svg>