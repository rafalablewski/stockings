<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="'Outfit', system-ui, sans-serif">
  <defs>
    <linearGradient id="textGrad8" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8B949E"/>
    </linearGradient>
    <radialGradient id="glow8" cx="70%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="layer1bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="layer2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" fill="#05070A"/>
  <text x="600" y="32" text-anchor="middle" fill="#6E7681" font-size="11" font-weight="500" letter-spacing="3">SKETCH 8 — GLASS LAYERS</text>
  <text x="600" y="52" text-anchor="middle" fill="#8B949E" font-size="11" font-style="italic">Three stacked glass surfaces with z-depth. Ticker → Name+Price → Meta. Each layer floats above the last.</text>
  <line x1="160" y1="64" x2="1040" y2="64" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>

  <!-- ═══ HERO CONTAINER (outermost) ═══ -->
  <rect x="40" y="84" width="1120" height="380" rx="16" fill="#0A0E14" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <rect x="40" y="84" width="1120" height="380" rx="16" fill="url(#glow8)"/>

  <!-- ═══ LAYER 3 (deepest, back): Ticker + Category ═══ -->
  <rect x="72" y="104" width="1056" height="36" rx="8" fill="#0D1117" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>
  <!-- Ticker badge -->
  <rect x="84" y="110" width="136" height="24" rx="12" fill="rgba(34,211,238,0.15)"/>
  <text x="96" y="127" fill="#22D3EE" font-size="10" font-family="'Space Mono', monospace" font-weight="600">NASDAQ: ASTS</text>
  <!-- Category pills -->
  <rect x="232" y="110" width="110" height="24" rx="12" fill="rgba(240,246,252,0.04)" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>
  <text x="248" y="127" fill="#8B949E" font-size="10" font-weight="500">D2D Cellular</text>
  <rect x="354" y="110" width="100" height="24" rx="12" fill="rgba(240,246,252,0.04)" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>
  <text x="370" y="127" fill="#8B949E" font-size="10" font-weight="500">Space Tech</text>
  <!-- Data freshness (right-aligned) -->
  <rect x="960" y="110" width="156" height="24" rx="12" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <text x="974" y="127" fill="#22D3EE" font-size="9" font-weight="500">📅 Feb 28, 2026 · Live</text>

  <!-- ═══ LAYER 2 (middle): Name + Price — the main surface ═══ -->
  <rect x="60" y="152" width="1080" height="160" rx="16" fill="url(#layer1bg)" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>

  <!-- Left: Company name -->
  <text x="96" y="210" fill="url(#textGrad8)" font-size="42" font-weight="700" letter-spacing="-1.5">ASTS SpaceMobile</text>
  <text x="96" y="238" fill="#8B949E" font-size="14" font-weight="400">First space-based cellular broadband for standard smartphones.</text>
  <text x="96" y="258" fill="#8B949E" font-size="14" font-weight="400">53+ MNO partnerships reaching 2.8B subscribers globally.</text>
  <!-- Accent bar (left border indicator, 6px wide, 32px tall) -->
  <rect x="72" y="192" width="6" height="32" rx="3" fill="#22D3EE" opacity="0.8"/>

  <!-- Glass-edge vertical divider -->
  <line x1="740" y1="172" x2="740" y2="292" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>

  <!-- Right: Price -->
  <text x="1092" y="215" text-anchor="end" fill="#F0F6FC" font-size="56" font-weight="700" font-family="'Space Mono', monospace" letter-spacing="-2">$52.49</text>
  <!-- Change pill -->
  <rect x="1002" y="228" width="90" height="26" rx="13" fill="rgba(126,231,135,0.15)"/>
  <text x="1047" y="246" text-anchor="middle" fill="#7EE787" font-size="12" font-weight="600">▲ 4.67%</text>
  <!-- Refresh -->
  <circle cx="780" cy="206" r="14" fill="rgba(240,246,252,0.04)" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>
  <text x="780" y="211" text-anchor="middle" fill="#6E7681" font-size="11">↻</text>
  <!-- Updated -->
  <text x="1092" y="278" text-anchor="end" fill="#6E7681" font-size="10" letter-spacing="0.03em">Updated: 3:45:22 PM</text>

  <!-- ═══ LAYER 1 (front, top z): Stats + Satellites ═══ -->
  <!-- This layer overlaps the bottom of Layer 2, creating depth -->
  <rect x="80" y="296" width="1040" height="72" rx="12" fill="#161B22" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>

  <!-- Glass-list cells inside (1px gap pattern) -->
  <!-- Satellites (featured, accent border) -->
  <rect x="81" y="297" width="176" height="70" rx="12" fill="rgba(34,211,238,0.06)"/>
  <rect x="81" y="297" width="3" height="70" rx="1" fill="#22D3EE" opacity="0.6"/>
  <text x="100" y="322" fill="#6E7681" font-size="9" font-weight="600" letter-spacing="1.2">CONSTELLATION</text>
  <text x="100" y="348" fill="#F0F6FC" font-size="20" font-weight="700" font-family="'Space Mono', monospace">7<tspan fill="#6E7681" font-size="14">/60</tspan></text>
  <text x="154" y="348" fill="#7EE787" font-size="10" font-weight="600">🛰</text>

  <!-- Divider -->
  <line x1="261" y1="310" x2="261" y2="354" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>

  <!-- Market Cap -->
  <text x="282" y="322" fill="#6E7681" font-size="9" font-weight="600" letter-spacing="1.2">MKT CAP</text>
  <text x="282" y="348" fill="#F0F6FC" font-size="18" font-weight="600" font-family="'Space Mono', monospace">$11.2B</text>

  <line x1="410" y1="310" x2="410" y2="354" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>

  <!-- EV -->
  <text x="430" y="322" fill="#6E7681" font-size="9" font-weight="600" letter-spacing="1.2">EV</text>
  <text x="430" y="348" fill="#F0F6FC" font-size="18" font-weight="600" font-family="'Space Mono', monospace">$12.8B</text>

  <line x1="548" y1="310" x2="548" y2="354" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>

  <!-- Progress -->
  <text x="568" y="322" fill="#6E7681" font-size="9" font-weight="600" letter-spacing="1.2">PROGRESS</text>
  <text x="568" y="348" fill="#22D3EE" font-size="18" font-weight="600" font-family="'Space Mono', monospace">12%</text>

  <line x1="670" y1="310" x2="670" y2="354" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>

  <!-- Cash -->
  <text x="690" y="322" fill="#6E7681" font-size="9" font-weight="600" letter-spacing="1.2">CASH</text>
  <text x="690" y="348" fill="#7EE787" font-size="18" font-weight="600" font-family="'Space Mono', monospace">$0.7B</text>

  <line x1="800" y1="310" x2="800" y2="354" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>

  <!-- Runway -->
  <text x="820" y="322" fill="#6E7681" font-size="9" font-weight="600" letter-spacing="1.2">RUNWAY</text>
  <text x="820" y="348" fill="#7EE787" font-size="18" font-weight="600" font-family="'Space Mono', monospace">5.2Q</text>

  <line x1="930" y1="310" x2="930" y2="354" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>

  <!-- Contracted Rev -->
  <text x="950" y="322" fill="#6E7681" font-size="9" font-weight="600" letter-spacing="1.2">CONTRACTED</text>
  <text x="950" y="348" fill="#79C0FF" font-size="18" font-weight="600" font-family="'Space Mono', monospace">$260M+</text>

  <!-- ═══ DEPTH VISUALIZATION (showing 3 layers) ═══ -->
  <text x="60" y="420" fill="#22D3EE" font-size="12" font-weight="600" letter-spacing="2">Z-DEPTH BREAKDOWN</text>

  <!-- Layer diagram -->
  <!-- Layer 3 (back) -->
  <rect x="60" y="440" width="400" height="24" rx="4" fill="#0D1117" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <text x="72" y="457" fill="#6E7681" font-size="10">Layer 3 (back): Ticker pills + category tags + data freshness</text>
  <text x="440" y="457" fill="#6E7681" font-size="9">z-index: 1 · surface: --surface · border: 0.08 opacity</text>

  <!-- Layer 2 (middle) -->
  <rect x="80" y="470" width="400" height="28" rx="4" fill="#161B22" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>
  <text x="92" y="489" fill="#8B949E" font-size="10">Layer 2 (middle): Company name + price — the main surface</text>
  <text x="460" y="489" fill="#6E7681" font-size="9">z-index: 2 · surface: --surface2 · border: 0.1 opacity</text>

  <!-- Layer 1 (front) -->
  <rect x="100" y="504" width="400" height="28" rx="4" fill="#21262D" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>
  <text x="112" y="523" fill="#F0F6FC" font-size="10">Layer 1 (front): Stats bar — overlaps Layer 2 bottom edge</text>
  <text x="480" y="523" fill="#6E7681" font-size="9">z-index: 3 · surface: --surface2 · accent left-bar</text>

  <!-- Arrows showing depth -->
  <text x="520" y="475" fill="#22D3EE" font-size="18">→</text>
  <text x="560" y="475" fill="#22D3EE" font-size="10" font-weight="600">INCREASING Z-DEPTH</text>
  <text x="560" y="490" fill="#6E7681" font-size="9">Creates parallax-like feel</text>
  <text x="560" y="503" fill="#6E7681" font-size="9">without drop shadows. Pure</text>
  <text x="560" y="516" fill="#6E7681" font-size="9">color-layer depth system.</text>

  <!-- ═══ DESIGN NOTES ═══ -->
  <line x1="40" y1="550" x2="1160" y2="550" stroke="rgba(240,246,252,0.06)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="578" fill="#22D3EE" font-size="12" font-weight="600" letter-spacing="2">DESIGN NOTES</text>

  <rect x="60" y="592" width="260" height="90" rx="12" fill="#0D1117" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>
  <text x="84" y="616" fill="#F0F6FC" font-size="12" font-weight="600">True z-depth, no shadows</text>
  <text x="84" y="634" fill="#8B949E" font-size="11">Three surfaces at different</text>
  <text x="84" y="650" fill="#8B949E" font-size="11">brightness levels (surface →</text>
  <text x="84" y="666" fill="#8B949E" font-size="11">surface2) create floating feel.</text>

  <rect x="340" y="592" width="260" height="90" rx="12" fill="#0D1117" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>
  <text x="364" y="616" fill="#F0F6FC" font-size="12" font-weight="600">Pill taxonomy (Layer 3)</text>
  <text x="364" y="634" fill="#8B949E" font-size="11">Ticker + categories as pills</text>
  <text x="364" y="650" fill="#8B949E" font-size="11">with 99px radius. Quick scan of</text>
  <text x="364" y="666" fill="#8B949E" font-size="11">"what stock is this?" at a glance.</text>

  <rect x="620" y="592" width="260" height="90" rx="12" fill="#0D1117" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>
  <text x="644" y="616" fill="#F0F6FC" font-size="12" font-weight="600">Accent left-bar on stats</text>
  <text x="644" y="634" fill="#8B949E" font-size="11">3px accent border on the</text>
  <text x="644" y="650" fill="#8B949E" font-size="11">constellation stat — matches</text>
  <text x="644" y="666" fill="#8B949E" font-size="11">investment card left-bar pattern.</text>

  <rect x="900" y="592" width="260" height="90" rx="12" fill="#0D1117" stroke="rgba(240,246,252,0.1)" stroke-width="1"/>
  <text x="924" y="616" fill="#F0F6FC" font-size="12" font-weight="600">Progressive disclosure</text>
  <text x="924" y="634" fill="#8B949E" font-size="11">Layer 3 = identity. Layer 2 =</text>
  <text x="924" y="650" fill="#8B949E" font-size="11">core data. Layer 1 = metrics.</text>
  <text x="924" y="666" fill="#8B949E" font-size="11">Information unfolds spatially.</text>

  <rect x="60" y="700" width="1100" height="36" rx="8" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <text x="84" y="718" fill="#22D3EE" font-size="11" font-weight="500">KEY CHANGE:</text>
  <text x="190" y="718" fill="#8B949E" font-size="11">Three glass surfaces at different z-depths create parallax-like floating without a single box-shadow. Layer overlap at bottom edge creates organic connection. Stats integrated as front layer.</text>
  <text x="84" y="734" fill="#6E7681" font-size="10">📱 Mobile: Layers stack vertically with 4px gaps between them. Same z-depth feeling preserved. Stats scroll horizontally.</text>
</svg>