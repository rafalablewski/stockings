<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(34,211,238,0.06)"/>
      <stop offset="100%" stop-color="rgba(34,211,238,0.02)"/>
    </linearGradient>
    <clipPath id="leftClip">
      <polygon points="40,100 620,100 560,380 40,380"/>
    </clipPath>
    <clipPath id="rightClip">
      <polygon points="620,100 1160,100 1160,380 560,380"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="660" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#6E7681" font-size="13" font-weight="500" letter-spacing="3">SKETCH 3 — DIAGONAL SPLIT PANEL</text>
  <line x1="200" y1="48" x2="1000" y2="48" stroke="#21262D" stroke-width="1"/>
  <text x="600" y="72" text-anchor="middle" fill="#8B949E" font-size="12" font-style="italic">Bold diagonal divider. Brand info on dark side, price on accent-tinted side. Creates visual tension and energy.</text>

  <!-- ═══ HEADER MOCKUP ═══ -->
  <!-- Outer container -->
  <rect x="40" y="100" width="1120" height="280" rx="16" fill="#0D1117" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>

  <!-- Left panel (dark) -->
  <polygon points="40,100 640,100 560,380 40,380" fill="url(#leftPanel)" clip-path="url(#leftClip)"/>

  <!-- Right panel (accent tinted) -->
  <polygon points="640,100 1160,100 1160,380 560,380" fill="url(#rightPanel)"/>

  <!-- Diagonal line -->
  <line x1="640" y1="100" x2="560" y2="380" stroke="#22D3EE" stroke-width="2" opacity="0.4"/>
  <!-- Glow on diagonal -->
  <line x1="640" y1="100" x2="560" y2="380" stroke="#22D3EE" stroke-width="8" opacity="0.06"/>

  <!-- ═══ LEFT SIDE: Brand ═══ -->
  <!-- Company name -->
  <text x="80" y="170" fill="#F0F6FC" font-size="36" font-weight="700" letter-spacing="-1.5">ASTS</text>
  <text x="80" y="200" fill="#8B949E" font-size="18" font-weight="300">SpaceMobile</text>

  <!-- Ticker -->
  <rect x="80" y="218" width="180" height="26" rx="6" fill="rgba(34,211,238,0.1)"/>
  <text x="90" y="236" fill="#22D3EE" font-size="12" font-family="monospace">NASDAQ · D2D Cellular</text>

  <!-- Description -->
  <text x="80" y="275" fill="#6E7681" font-size="12">First space-based cellular broadband</text>
  <text x="80" y="293" fill="#6E7681" font-size="12">53+ MNO partnerships · 2.8B reach</text>

  <!-- Data freshness -->
  <rect x="80" y="310" width="200" height="22" rx="4" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <text x="92" y="325" fill="#22D3EE" font-size="10">📅 Data as of: Feb 28, 2026</text>

  <!-- ═══ RIGHT SIDE: Price & Data ═══ -->
  <!-- Price -->
  <text x="1100" y="175" text-anchor="end" fill="#F0F6FC" font-size="60" font-weight="800" font-family="monospace" letter-spacing="-3">$52.49</text>

  <!-- Change -->
  <rect x="968" y="190" width="132" height="28" rx="14" fill="rgba(126,231,135,0.12)"/>
  <text x="1034" y="209" text-anchor="middle" fill="#7EE787" font-size="13" font-weight="700">▲ +2.34 (4.67%)</text>

  <!-- Mini metrics row -->
  <rect x="750" y="240" width="100" height="50" rx="8" fill="rgba(240,246,252,0.04)" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <text x="800" y="258" text-anchor="middle" fill="#6E7681" font-size="9" font-weight="500">MKT CAP</text>
  <text x="800" y="278" text-anchor="middle" fill="#F0F6FC" font-size="14" font-weight="600">$11.2B</text>

  <rect x="862" y="240" width="100" height="50" rx="8" fill="rgba(240,246,252,0.04)" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <text x="912" y="258" text-anchor="middle" fill="#6E7681" font-size="9" font-weight="500">SATS</text>
  <text x="912" y="278" text-anchor="middle" fill="#7EE787" font-size="14" font-weight="600">7/60</text>

  <rect x="974" y="240" width="100" height="50" rx="8" fill="rgba(240,246,252,0.04)" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <text x="1024" y="258" text-anchor="middle" fill="#6E7681" font-size="9" font-weight="500">CASH</text>
  <text x="1024" y="278" text-anchor="middle" fill="#22D3EE" font-size="14" font-weight="600">$0.7B</text>

  <!-- Updated timestamp -->
  <text x="1100" y="320" text-anchor="end" fill="#6E7681" font-size="10">Updated: 3:45 PM · ↻ Refresh</text>

  <!-- ═══ ANNOTATION: Design Notes ═══ -->
  <line x1="40" y1="410" x2="1160" y2="410" stroke="#21262D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="440" fill="#22D3EE" font-size="13" font-weight="600">Design Rationale</text>

  <rect x="60" y="455" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="80" y="478" fill="#F0F6FC" font-size="12" font-weight="600">Diagonal energy</text>
  <text x="80" y="496" fill="#8B949E" font-size="11">The angled divider creates visual</text>
  <text x="80" y="512" fill="#8B949E" font-size="11">dynamism — a stock going up.</text>

  <rect x="330" y="455" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="350" y="478" fill="#F0F6FC" font-size="12" font-weight="600">Clear info separation</text>
  <text x="350" y="496" fill="#8B949E" font-size="11">Left = identity (who). Right =</text>
  <text x="350" y="512" fill="#8B949E" font-size="11">performance (how). No confusion.</text>

  <rect x="600" y="455" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="620" y="478" fill="#F0F6FC" font-size="12" font-weight="600">Embedded mini-metrics</text>
  <text x="620" y="496" fill="#8B949E" font-size="11">Market cap, sats, cash in compact</text>
  <text x="620" y="512" fill="#8B949E" font-size="11">cards — reduces stats row need.</text>

  <rect x="870" y="455" width="260" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="890" y="478" fill="#F0F6FC" font-size="12" font-weight="600">Accent-tinted right panel</text>
  <text x="890" y="496" fill="#8B949E" font-size="11">Subtle cyan wash draws the eye</text>
  <text x="890" y="512" fill="#8B949E" font-size="11">to the price zone naturally.</text>

  <!-- Layout wireframe -->
  <text x="60" y="575" fill="#22D3EE" font-size="13" font-weight="600">Layout Structure</text>

  <polygon points="60,595 400,595 360,645 60,645" fill="none" stroke="#8B949E" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="200" y="625" text-anchor="middle" fill="#8B949E" font-size="10" opacity="0.7">BRAND ZONE (dark)</text>

  <line x1="400" y1="595" x2="360" y2="645" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
  <text x="390" y="580" fill="#22D3EE" font-size="9">diagonal</text>

  <polygon points="400,595 700,595 700,645 360,645" fill="none" stroke="#22D3EE" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="540" y="625" text-anchor="middle" fill="#22D3EE" font-size="10" opacity="0.7">PRICE ZONE (accent-tinted)</text>

  <text x="60" y="658" fill="#6E7681" font-size="10">📱 Mobile: diagonal flattens to horizontal split — brand on top, price below.</text>
</svg>