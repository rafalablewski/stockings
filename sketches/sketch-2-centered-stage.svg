<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070A"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="priceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#8B949E"/>
    </linearGradient>
    <linearGradient id="chartArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#6E7681" font-size="13" font-weight="500" letter-spacing="3">SKETCH 2 — CENTERED STAGE</text>
  <line x1="200" y1="48" x2="1000" y2="48" stroke="#21262D" stroke-width="1"/>
  <text x="600" y="72" text-anchor="middle" fill="#8B949E" font-size="12" font-style="italic">Price as the hero. Center-aligned, vertically stacked, with a background chart silhouette. Apple-inspired drama.</text>

  <!-- ═══ HEADER MOCKUP ═══ -->
  <rect x="40" y="90" width="1120" height="310" rx="16" fill="#0D1117" stroke="rgba(240,246,252,0.06)" stroke-width="1"/>
  <!-- Radial glow -->
  <ellipse cx="600" cy="200" rx="400" ry="200" fill="url(#glow2)"/>

  <!-- Background chart silhouette -->
  <polyline points="80,360 140,350 200,345 260,340 320,335 380,342 440,330 500,325 560,318 620,310 680,308 740,295 800,290 840,280 900,275 960,270 1020,260 1080,255 1120,250" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.1"/>
  <polygon points="80,360 140,350 200,345 260,340 320,335 380,342 440,330 500,325 560,318 620,310 680,308 740,295 800,290 840,280 900,275 960,270 1020,260 1080,255 1120,250 1120,400 80,400" fill="url(#chartArea)" opacity="0.4"/>

  <!-- Ticker badge (top) -->
  <rect x="519" y="115" width="162" height="28" rx="14" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
  <text x="600" y="134" text-anchor="middle" fill="#22D3EE" font-size="12" font-family="monospace" font-weight="600">NASDAQ: ASTS</text>

  <!-- Massive price -->
  <text x="600" y="218" text-anchor="middle" fill="url(#priceGrad)" font-size="80" font-weight="800" font-family="monospace" letter-spacing="-4">$52.49</text>

  <!-- Change badge -->
  <rect x="530" y="235" width="140" height="30" rx="15" fill="rgba(126,231,135,0.12)"/>
  <text x="600" y="255" text-anchor="middle" fill="#7EE787" font-size="14" font-weight="700">▲ +2.34 (4.67%)</text>

  <!-- Company name (below price) -->
  <text x="600" y="300" text-anchor="middle" fill="#8B949E" font-size="20" font-weight="300" letter-spacing="6">ASTS SPACEMOBILE</text>

  <!-- Subtitle -->
  <text x="600" y="324" text-anchor="middle" fill="#6E7681" font-size="12">Direct-to-Device Cellular · 🛰 7/60 Satellites · Updated 3:45 PM</text>

  <!-- Thin accent line -->
  <line x1="400" y1="345" x2="800" y2="345" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>

  <!-- Description -->
  <text x="600" y="370" text-anchor="middle" fill="#6E7681" font-size="12">First space-based cellular broadband for standard smartphones</text>
  <text x="600" y="388" text-anchor="middle" fill="#6E7681" font-size="12">53+ MNO partnerships reaching 2.8B subscribers globally</text>

  <!-- ═══ ANNOTATION: Design Notes ═══ -->
  <line x1="40" y1="425" x2="1160" y2="425" stroke="#21262D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="455" fill="#22D3EE" font-size="13" font-weight="600">Design Rationale</text>

  <rect x="60" y="470" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="80" y="493" fill="#F0F6FC" font-size="12" font-weight="600">Price is the hero</text>
  <text x="80" y="511" fill="#8B949E" font-size="11">80px monospace price dominates.</text>
  <text x="80" y="527" fill="#8B949E" font-size="11">Users come for the price first.</text>

  <rect x="330" y="470" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="350" y="493" fill="#F0F6FC" font-size="12" font-weight="600">Background chart silhouette</text>
  <text x="350" y="511" fill="#8B949E" font-size="11">Subtle 30-day trend adds depth</text>
  <text x="350" y="527" fill="#8B949E" font-size="11">without competing with content.</text>

  <rect x="600" y="470" width="250" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="620" y="493" fill="#F0F6FC" font-size="12" font-weight="600">Inverted hierarchy</text>
  <text x="620" y="511" fill="#8B949E" font-size="11">Ticker badge → Price → Name.</text>
  <text x="620" y="527" fill="#8B949E" font-size="11">Breaks convention deliberately.</text>

  <rect x="870" y="470" width="260" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="890" y="493" fill="#F0F6FC" font-size="12" font-weight="600">Center alignment</text>
  <text x="890" y="511" fill="#8B949E" font-size="11">Creates symmetry and focus.</text>
  <text x="890" y="527" fill="#8B949E" font-size="11">Works well on all screen sizes.</text>

  <!-- Layout wireframe -->
  <text x="60" y="590" fill="#22D3EE" font-size="13" font-weight="600">Visual Hierarchy (top → bottom)</text>

  <rect x="380" y="605" width="120" height="24" rx="4" fill="none" stroke="#22D3EE" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="440" y="621" text-anchor="middle" fill="#22D3EE" font-size="9" opacity="0.7">TICKER BADGE</text>
  <text x="520" y="621" fill="#6E7681" font-size="9">← small, subtle entry point</text>

  <rect x="300" y="633" width="280" height="24" rx="4" fill="none" stroke="#F0F6FC" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="440" y="649" text-anchor="middle" fill="#F0F6FC" font-size="9" opacity="0.7">PRICE (80px, dominant)</text>
  <text x="600" y="649" fill="#6E7681" font-size="9">← maximum visual weight</text>

  <rect x="340" y="661" width="200" height="20" rx="4" fill="none" stroke="#8B949E" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="440" y="675" text-anchor="middle" fill="#8B949E" font-size="9" opacity="0.7">NAME + META</text>
  <text x="560" y="675" fill="#6E7681" font-size="9">← supporting context</text>
</svg>