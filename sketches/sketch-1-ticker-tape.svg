<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sparkline1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="520" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#6E7681" font-size="13" font-weight="500" letter-spacing="3">SKETCH 1 — TICKER TAPE</text>
  <line x1="200" y1="48" x2="1000" y2="48" stroke="#21262D" stroke-width="1"/>

  <!-- Concept description -->
  <text x="600" y="72" text-anchor="middle" fill="#8B949E" font-size="12" font-style="italic">Single-row horizontal flow: name → ticker → sparkline → price. Inspired by Bloomberg terminals.</text>

  <!-- ═══ MAIN HEADER BAR ═══ -->
  <rect x="40" y="100" width="1120" height="88" rx="12" fill="#0D1117" stroke="rgba(240,246,252,0.08)" stroke-width="1"/>
  <!-- Accent glow left edge -->
  <rect x="40" y="100" width="4" height="88" rx="2" fill="#22D3EE"/>
  <rect x="40" y="100" width="120" height="88" rx="12" fill="url(#accent1)" opacity="0.5"/>

  <!-- Company name -->
  <text x="72" y="138" fill="#F0F6FC" font-size="28" font-weight="700" letter-spacing="-1">ASTS SpaceMobile</text>

  <!-- Ticker badge -->
  <rect x="72" y="150" width="168" height="24" rx="4" fill="rgba(34,211,238,0.12)"/>
  <text x="82" y="167" fill="#22D3EE" font-size="11" font-family="monospace" font-weight="600">NASDAQ: ASTS · D2D</text>

  <!-- Satellites pill -->
  <rect x="252" y="150" width="110" height="24" rx="4" fill="rgba(126,231,135,0.12)"/>
  <text x="262" y="167" fill="#7EE787" font-size="11" font-weight="600">🛰 7/60 Sats</text>

  <!-- Sparkline area (center of bar) -->
  <polyline points="440,148 460,142 480,145 500,138 520,140 540,132 560,136 580,128 600,130 620,124 640,128 660,120 680,118 700,122 720,114 740,110 760,115 780,108 800,112 820,105 840,108 850,104" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.6"/>
  <polyline points="440,148 460,142 480,145 500,138 520,140 540,132 560,136 580,128 600,130 620,124 640,128 660,120 680,118 700,122 720,114 740,110 760,115 780,108 800,112 820,105 840,108 850,104 850,170 440,170" fill="url(#sparkline1)" opacity="0.15"/>
  <text x="640" y="172" text-anchor="middle" fill="#6E7681" font-size="9">30-DAY</text>

  <!-- Price (right side) -->
  <text x="1100" y="142" text-anchor="end" fill="#F0F6FC" font-size="40" font-weight="700" font-family="monospace" letter-spacing="-2">$52.49</text>
  <text x="1100" y="168" text-anchor="end" fill="#7EE787" font-size="13" font-weight="600">+2.34 (4.67%)</text>

  <!-- Refresh icon placeholder -->
  <circle cx="920" cy="144" r="16" fill="none" stroke="#6E7681" stroke-width="1" opacity="0.5"/>
  <text x="920" y="149" text-anchor="middle" fill="#6E7681" font-size="14">↻</text>

  <!-- ═══ ANNOTATION: Design Notes ═══ -->
  <line x1="40" y1="220" x2="1160" y2="220" stroke="#21262D" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="250" fill="#22D3EE" font-size="13" font-weight="600">Design Rationale</text>

  <!-- Note boxes -->
  <rect x="60" y="265" width="240" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="80" y="288" fill="#F0F6FC" font-size="12" font-weight="600">Compact single-row</text>
  <text x="80" y="306" fill="#8B949E" font-size="11">All key info in one scannable</text>
  <text x="80" y="322" fill="#8B949E" font-size="11">line. No vertical scrolling needed.</text>

  <rect x="320" y="265" width="240" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="340" y="288" fill="#F0F6FC" font-size="12" font-weight="600">Embedded sparkline</text>
  <text x="340" y="306" fill="#8B949E" font-size="11">30-day trend visible at a glance</text>
  <text x="340" y="322" fill="#8B949E" font-size="11">without taking vertical space.</text>

  <rect x="580" y="265" width="240" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="600" y="288" fill="#F0F6FC" font-size="12" font-weight="600">Accent left-edge</text>
  <text x="600" y="306" fill="#8B949E" font-size="11">Color-coded per stock (cyan,</text>
  <text x="600" y="322" fill="#8B949E" font-size="11">violet, mint). Quick visual ID.</text>

  <rect x="840" y="265" width="280" height="80" rx="8" fill="#161B22" stroke="#21262D" stroke-width="1"/>
  <text x="860" y="288" fill="#F0F6FC" font-size="12" font-weight="600">Price change always visible</text>
  <text x="860" y="306" fill="#8B949E" font-size="11">Green/red change amount sits right</text>
  <text x="860" y="322" fill="#8B949E" font-size="11">below price. No need to hunt for it.</text>

  <!-- ═══ LAYOUT WIREFRAME ═══ -->
  <text x="60" y="390" fill="#22D3EE" font-size="13" font-weight="600">Layout Structure</text>

  <!-- Wireframe boxes -->
  <rect x="60" y="405" width="200" height="40" rx="4" fill="none" stroke="#22D3EE" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="160" y="430" text-anchor="middle" fill="#22D3EE" font-size="10" opacity="0.7">BRAND (name + ticker)</text>

  <rect x="270" y="405" width="100" height="40" rx="4" fill="none" stroke="#7EE787" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="320" y="430" text-anchor="middle" fill="#7EE787" font-size="10" opacity="0.7">BADGES</text>

  <rect x="380" y="405" width="440" height="40" rx="4" fill="none" stroke="#8B949E" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="600" y="430" text-anchor="middle" fill="#8B949E" font-size="10" opacity="0.7">SPARKLINE (flexible width)</text>

  <rect x="830" y="405" width="200" height="40" rx="4" fill="none" stroke="#F0F6FC" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="930" y="430" text-anchor="middle" fill="#F0F6FC" font-size="10" opacity="0.7">PRICE + CHANGE</text>

  <!-- Arrows -->
  <line x1="262" y1="425" x2="268" y2="425" stroke="#6E7681" stroke-width="1" marker-end="none"/>
  <line x1="372" y1="425" x2="378" y2="425" stroke="#6E7681" stroke-width="1"/>
  <line x1="822" y1="425" x2="828" y2="425" stroke="#6E7681" stroke-width="1"/>

  <!-- Mobile note -->
  <rect x="60" y="465" width="1070" height="36" rx="6" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.15)" stroke-width="1"/>
  <text x="80" y="488" fill="#22D3EE" font-size="11">📱 Mobile: Wraps to 2 rows — [Name + Ticker] on top, [Price + Change] on bottom, sparkline hidden.</text>
</svg>